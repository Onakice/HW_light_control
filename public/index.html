<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Light Control</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --card-on: #1c2a1e;
      --border: #2a2d3a;
      --border-on: #2d5c35;
      --text: #e2e4ec;
      --muted: #6b7280;
      --on-color: #34d058;
      --off-color: #6b7280;
      --btn-on: #238636;
      --btn-on-hover: #2ea043;
      --btn-off: #21262d;
      --btn-off-hover: #30363d;
      --danger: #f85149;
      --ch2-accent: #58a6ff;
      --ch2-btn-on: #1158a7;
      --ch2-btn-on-hover: #1a6fcc;
      --radius: 14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    header { text-align: center; margin-bottom: 36px; }
    header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
    header p { color: var(--muted); font-size: 0.875rem; margin-top: 6px; }

    .refresh-bar {
      display: flex; align-items: center; gap: 10px; margin-bottom: 28px;
    }
    .refresh-bar button {
      padding: 7px 18px; background: var(--btn-off); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px; font-size: 0.82rem;
      cursor: pointer; transition: background 0.15s;
    }
    .refresh-bar button:hover { background: var(--btn-off-hover); }
    .refresh-label { color: var(--muted); font-size: 0.82rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 1000px;
    }

    /* ── Device card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card-header {
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-title { font-size: 1.05rem; font-weight: 700; }
    .device-id {
      font-size: 0.68rem; color: var(--muted);
      font-family: "SF Mono", "Fira Code", monospace; word-break: break-all;
    }

    /* ── Channel row ── */
    .channel {
      background: #12151f;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .channel-info { flex: 1; }
    .channel-label { font-size: 0.78rem; font-weight: 700; color: var(--muted); }
    .channel-state {
      font-size: 1rem; font-weight: 800;
      color: var(--off-color);
      transition: color 0.3s;
    }
    .channel-state.on  { color: var(--on-color); }
    .channel-state.on2 { color: var(--ch2-accent); }
    .channel-state.loading { color: var(--muted); font-size: 0.85rem; }

    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--off-color); flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .dot.on  { background: var(--on-color);  box-shadow: 0 0 6px var(--on-color); }
    .dot.on2 { background: var(--ch2-accent); box-shadow: 0 0 6px var(--ch2-accent); }

    .btn-pair { display: flex; gap: 6px; }

    button {
      padding: 7px 14px;
      border: none; border-radius: 7px;
      font-size: 0.78rem; font-weight: 700;
      cursor: pointer; transition: background 0.15s, opacity 0.15s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-on  { background: var(--btn-on);  color: #fff; }
    .btn-on:hover:not(:disabled)  { background: var(--btn-on-hover); }

    .btn-on2  { background: var(--ch2-btn-on); color: #fff; }
    .btn-on2:hover:not(:disabled) { background: var(--ch2-btn-on-hover); }

    .btn-off { background: var(--btn-off); color: var(--text); border: 1px solid var(--border); }
    .btn-off:hover:not(:disabled) { background: var(--btn-off-hover); }

    .error-msg { font-size: 0.72rem; color: var(--danger); min-height: 16px; }

    footer {
      margin-top: 48px; color: var(--muted); font-size: 0.78rem; text-align: center;
    }

    /* channel 1 = green accent, channel 2 = blue accent */
  </style>
</head>
<body>

<header>
  <h1>Light Control</h1>
  <p>Tuya Smart Switch Dashboard</p>
</header>

<div class="refresh-bar">
  <button id="refresh-btn" onclick="refreshAll()">&#8635; Refresh all</button>
  <span class="refresh-label" id="last-updated">—</span>
</div>

<div class="grid" id="grid"></div>

<footer>Auto-refreshes every 10 s &nbsp;·&nbsp; Tuya OpenAPI</footer>

<script>
  const SWITCHES = [
    { id: "sw1", label: "Switch 1", device: "a3e863268d4c0d259dqtbe" },
    { id: "sw2", label: "Switch 2", device: "a33a1415dc4aeb626az6ba" },
    { id: "sw3", label: "Switch 3", device: "a376073de72bb6b235bbln" },
    { id: "sw4", label: "Switch 4", device: "a3e59fd6e1dab69fc1sqpc" },
  ];

  // Build cards — each with two channel rows
  const grid = document.getElementById("grid");
  SWITCHES.forEach(({ id, label, device }) => {
    grid.insertAdjacentHTML("beforeend", `
      <div class="card" id="card-${id}">
        <div class="card-header">
          <span class="card-title">${label}</span>
        </div>
        <div class="device-id">${device}</div>

        ${[1, 2].map(ch => `
        <div class="channel" id="channel-${id}-${ch}">
          <span class="dot" id="dot-${id}-${ch}"></span>
          <div class="channel-info">
            <div class="channel-label">Channel ${ch}</div>
            <div class="channel-state loading" id="state-${id}-${ch}">…</div>
          </div>
          <div class="btn-pair">
            <button class="btn-on${ch === 2 ? '2' : ''}" id="btn-on-${id}-${ch}"
              onclick="control('${id}','${ch}','on')" disabled>ON</button>
            <button class="btn-off" id="btn-off-${id}-${ch}"
              onclick="control('${id}','${ch}','off')" disabled>OFF</button>
          </div>
        </div>
        `).join("")}

        <div class="error-msg" id="err-${id}"></div>
      </div>
    `);
  });

  // ── State helpers ──────────────────────────────────────────────────────────
  function setChannelState(sw, ch, state) {
    const dot   = document.getElementById(`dot-${sw}-${ch}`);
    const label = document.getElementById(`state-${sw}-${ch}`);
    const btnOn  = document.getElementById(`btn-on-${sw}-${ch}`);
    const btnOff = document.getElementById(`btn-off-${sw}-${ch}`);

    label.classList.remove("loading");

    const onClass = ch == 2 ? "on2" : "on";

    if (state === true) {
      dot.className   = `dot ${onClass}`;
      label.className = `channel-state ${onClass}`;
      label.textContent = "ON";
    } else if (state === false) {
      dot.className   = "dot";
      label.className = "channel-state";
      label.textContent = "OFF";
    } else {
      dot.className   = "dot";
      label.className = "channel-state";
      label.textContent = "—";
    }

    btnOn.disabled  = false;
    btnOff.disabled = false;
  }

  function setLoading(sw, ch, isLoading) {
    document.getElementById(`btn-on-${sw}-${ch}`).disabled  = isLoading;
    document.getElementById(`btn-off-${sw}-${ch}`).disabled = isLoading;
  }

  function setError(sw, msg) {
    document.getElementById(`err-${sw}`).textContent = msg || "";
  }

  // ── API calls ──────────────────────────────────────────────────────────────
  async function fetchState(sw) {
    try {
      const r = await fetch(`/switch/${sw}/state`);
      const d = await r.json();
      if (!r.ok) throw new Error(d.error || r.statusText);
      setChannelState(sw, 1, d.switch_1);
      setChannelState(sw, 2, d.switch_2);
      setError(sw, "");
    } catch (e) {
      setChannelState(sw, 1, null);
      setChannelState(sw, 2, null);
      setError(sw, "Failed to fetch state");
    }
  }

  async function control(sw, ch, action) {
    setLoading(sw, ch, true);
    setError(sw, "");
    try {
      const r = await fetch(`/switch/${sw}/${ch}/${action}`, { method: "POST" });
      const d = await r.json();
      if (!r.ok || !d.success) throw new Error(d.error || JSON.stringify(d));
      setChannelState(sw, ch, action === "on");
      setTimeout(() => fetchState(sw), 1000);
    } catch (e) {
      setError(sw, e.message.slice(0, 80));
      fetchState(sw);
    } finally {
      setLoading(sw, ch, false);
    }
  }

  async function refreshAll() {
    const btn = document.getElementById("refresh-btn");
    btn.disabled = true;
    await Promise.all(SWITCHES.map(s => fetchState(s.id)));
    document.getElementById("last-updated").textContent =
      "Updated " + new Date().toLocaleTimeString();
    btn.disabled = false;
  }

  refreshAll();
  setInterval(refreshAll, 10000);
</script>
</body>
</html>
